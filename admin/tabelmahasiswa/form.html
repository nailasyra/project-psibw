<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Mahasiswa — SIAKAD</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #2980b9;
            --primary-dark: #1f6391;
            --sidebar-bg: #1a3a5c;
            --green: #27ae60;
            --red: #e74c3c;
            --bg: #f0f4f8;
            --white: #ffffff;
            --text: #2d3748;
            --text-muted: #718096;
            --border: #e2e8f0;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 10px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 16px;
        }

        /* ===== CARD ===== */
        .form-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 560px;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .form-header {
            background: var(--sidebar-bg);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .form-header .header-icon {
            width: 42px; height: 42px;
            background: var(--primary);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: white;
            flex-shrink: 0;
        }

        .form-header h2 {
            font-size: 16px;
            font-weight: 700;
            color: white;
            line-height: 1.3;
        }

        .form-header p {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        /* ===== BODY ===== */
        .form-body {
            padding: 28px;
        }

        /* ===== SECTION LABEL ===== */
        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 14px;
            padding-bottom: 6px;
            border-bottom: 1.5px solid var(--border);
        }

        /* ===== FORM GROUP ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-group label span.required {
            color: var(--red);
            margin-left: 2px;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group input[type="email"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            color: var(--text);
            background: white;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(41,128,185,0.12);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 72px;
        }

        /* 2 kolom untuk field pendek */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* ===== HINT ===== */
        .field-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ===== DIVIDER ===== */
        .divider { height: 1px; background: var(--border); margin: 20px 0; }

        /* ===== FOOTER ===== */
        .form-footer {
            padding: 18px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            background: white;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-back:hover { border-color: var(--primary); color: var(--primary); }

        .btn-group { display: flex; gap: 10px; }

        .btn-reset {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-reset:hover { border-color: var(--red); color: var(--red); }

        .btn-simpan {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 20px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-simpan:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-simpan:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ===== TOAST ===== */
        .toast-wrap {
            position: fixed;
            bottom: 24px; right: 24px;
            z-index: 9999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast-msg {
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px; font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 10px;
            animation: slideIn 0.25s ease;
        }
        .toast-success { background: #eafaf1; color: #1e8449; border: 1.5px solid #a9dfbf; }
        .toast-error   { background: #fdedec; color: #c0392b; border: 1.5px solid #f1948a; }
        @keyframes slideIn {
            from { transform: translateX(60px); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
    </style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<div class="form-card">

    <!-- HEADER -->
    <div class="form-header">
        <div class="header-icon">
            <i class="fas fa-user-plus"></i>
        </div>
        <div>
            <h2>Tambah Data Mahasiswa</h2>
            <p>Sistem Informasi Akademik — FMIPA Universitas Riau</p>
        </div>
    </div>

    <!-- BODY -->
    <div class="form-body">

        <!-- Identitas -->
        <div class="section-label"><i class="fas fa-id-card" style="margin-right:6px;"></i>Identitas Mahasiswa</div>

        <div class="form-group">
            <label>NIM <span class="required">*</span></label>
            <input type="text" id="nim" name="nim" placeholder="Contoh: 2108110001" maxlength="20">
        </div>

        <div class="form-group">
            <label>Nama Lengkap <span class="required">*</span></label>
            <input type="text" id="nama" name="nama" placeholder="Nama lengkap mahasiswa">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" name="email" placeholder="email@student.unri.ac.id">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Jurusan <span class="required">*</span></label>
                <select id="jur" name="jur">
                    <option value="160301">Matematika</option>
                    <option value="160302">Fisika</option>
                    <option value="160303">Kimia</option>
                    <option value="160304">Biologi</option>
                    <option value="160305">Ilmu Komputer</option>
                </select>
            </div>
            <div class="form-group">
                <label>Program Studi <span class="required">*</span></label>
                <select id="prodi" name="prodi">
                    <option value="160311">Matematika</option>
                    <option value="160312">Statistika</option>
                    <option value="160313">Fisika</option>
                    <option value="160314">Kimia</option>
                    <option value="160315">Biologi</option>
                    <option value="160316">Sistem Informasi</option>
                    <option value="160317">Manajemen Informatika</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Status</label>
                <select id="status" name="status">
                    <option value="1">Aktif</option>
                    <option value="2">Masa Langkau</option>
                    <option value="3">Alpa Studi</option>
                    <option value="4">Semhas</option>
                    <option value="5">Kompre</option>
                    <option value="6">Alumni</option>
                </select>
            </div>
            <div class="form-group">
                <label>Agama</label>
                <select id="agama" name="agama">
                    <option value="1">Islam</option>
                    <option value="2">Kristen</option>
                    <option value="3">Katholik</option>
                    <option value="4">Hindu</option>
                    <option value="5">Buddha</option>
                    <option value="6">Konghuchu</option>
                </select>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Data Pribadi -->
        <div class="section-label"><i class="fas fa-user" style="margin-right:6px;"></i>Data Pribadi</div>

        <div class="form-row">
            <div class="form-group">
                <label>Jenis Kelamin</label>
                <select id="jk" name="jk">
                    <option value="1">Laki-Laki</option>
                    <option value="0">Perempuan</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tanggal Lahir</label>
                <input type="date" id="tgl_lahir" name="tgl_lahir">
            </div>
        </div>

        <div class="form-group">
            <label>Tempat Lahir</label>
            <input type="text" id="tmp_lahir" name="tmp_lahir" placeholder="Kota tempat lahir">
        </div>

        <div class="form-group">
            <label>Alamat</label>
            <textarea id="alamat" name="alamat" placeholder="Alamat lengkap mahasiswa"></textarea>
        </div>

    </div><!-- /form-body -->

    <!-- FOOTER -->
    <div class="form-footer">
        <a href="mahasiswa.php" class="btn-back">
            <i class="fas fa-arrow-left"></i> Kembali
        </a>
        <div class="btn-group">
            <button type="button" class="btn-reset" onclick="resetForm()">
                <i class="fas fa-undo"></i> Reset
            </button>
            <button type="button" class="btn-simpan" id="btnSimpan" onclick="simpanData()">
                <i class="fas fa-save"></i> Simpan
            </button>
        </div>
    </div>

</div><!-- /form-card -->

<script>
function val(id) { return document.getElementById(id).value.trim(); }

function showToast(msg, type = 'success') {
    const wrap = document.getElementById('toastWrap');
    const el   = document.createElement('div');
    el.className = `toast-msg toast-${type}`;
    el.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'times-circle'}"></i> ${msg}`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

function resetForm() {
    ['nim','nama','email','tmp_lahir','tgl_lahir','alamat'].forEach(id => {
        document.getElementById(id).value = '';
    });
    ['jur','prodi','status','agama','jk'].forEach(id => {
        document.getElementById(id).selectedIndex = 0;
    });
}

async function simpanData() {
    const nim  = val('nim');
    const nama = val('nama');

    if (!nim)  { showToast('NIM wajib diisi', 'error'); return; }
    if (!nama) { showToast('Nama wajib diisi', 'error'); return; }

    const btn = document.getElementById('btnSimpan');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

    const payload = {
        nim,
        nama,
        email    : val('email'),
        jur      : val('jur'),
        prodi    : val('prodi'),
        agama    : val('agama'),
        status   : val('status'),
        jk       : val('jk'),
        tgl_lahir: val('tgl_lahir'),
        tmp_lahir: val('tmp_lahir'),
        alamat   : val('alamat'),
        foto     : ''
    };

    try {
        const res  = await fetch('http://localhost/project_uas/api/mahasiswa/post.php', {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body   : JSON.stringify(payload)
        });
        const data = await res.json();

        if (data.status === 'success') {
            showToast('Data mahasiswa berhasil disimpan!', 'success');
            setTimeout(() => window.location.href = 'mahasiswa.php', 1500);
        } else {
            showToast('Gagal: ' + (data.message || 'Terjadi kesalahan'), 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Simpan';
        }
    } catch (err) {
        showToast('Gagal terhubung ke server: ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Simpan';
    }
}
</script>

</body>
</html>
